name: timeline-for-audio

services:
  worker:
    image: timeline-for-audio-worker-cpu:latest
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      TIMELINE_FOR_AUDIO_WORKER_FLAVOR: cpu
      TIMELINE_FOR_AUDIO_RUNTIME_DEFAULTS: /app/config/runtime.defaults.json
      TIMELINE_FOR_AUDIO_APPDATA_ROOT: /shared/app-data
      TIMELINE_FOR_AUDIO_UPLOADS_ROOT: /shared/uploads
      TIMELINE_FOR_AUDIO_OUTPUTS_ROOT: /shared/outputs
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
      TORCH_HOME: /cache/torch
    volumes:
      - app-data:/shared/app-data
      - outputs:/shared/outputs
      - uploads:/shared/uploads
      - hf-cache:/cache/huggingface
      - torch-cache:/cache/torch

volumes:
  app-data:
  outputs:
  uploads:
  hf-cache:
  torch-cache:
