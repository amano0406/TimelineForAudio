name: timeline-for-audio

services:
  worker:
    image: timeline-for-audio-worker-cpu:latest
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      TIMELINE_FOR_AUDIO_WORKER_FLAVOR: cpu
      TIMELINE_FOR_AUDIO_RUNTIME_DEFAULTS: /app/config/runtime.defaults.json
      TIMELINE_FOR_AUDIO_APPDATA_ROOT: /shared/app-data
      TIMELINE_FOR_AUDIO_DOWNLOADS_ROOT: /workspace/output
      TIMELINE_FOR_AUDIO_SETTINGS_PATH: /workspace/settings.json
      TIMELINE_FOR_AUDIO_SETTINGS_EXAMPLE_PATH: /workspace/settings.example.json
      PYTHONPATH: /workspace/worker/src
      HF_HOME: /shared/cache/huggingface
      TRANSFORMERS_CACHE: /shared/cache/huggingface
      TORCH_HOME: /shared/cache/torch
    volumes:
      - ./:/workspace
      - app-data:/shared/app-data
      - cache-data:/shared/cache

  api:
    image: timeline-for-audio-health-api:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      TIMELINE_FOR_AUDIO_SETTINGS_PATH: /workspace/settings.json
      TIMELINE_FOR_AUDIO_API_PORT: ${TIMELINE_FOR_AUDIO_API_PORT:-19100}
    ports:
      - "127.0.0.1:${TIMELINE_FOR_AUDIO_API_PORT:-19100}:${TIMELINE_FOR_AUDIO_API_PORT:-19100}"
    volumes:
      - ./:/workspace:ro

volumes:
  app-data:
  cache-data:
